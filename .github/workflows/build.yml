'EOF'
name: Build Windows EXE

on:
  workflow_dispatch:  # Solo manual, no en cada push

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller edge-tts TikTokLive pydub
    
    - name: Download FFmpeg
      run: |
        Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
        Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_temp"
        Copy-Item "ffmpeg_temp/ffmpeg-*-essentials_build/bin/ffmpeg.exe" -Destination "ffmpeg.exe"
        Copy-Item "ffmpeg_temp/ffmpeg-*-essentials_build/bin/ffprobe.exe" -Destination "ffprobe.exe"
        Remove-Item "ffmpeg.zip"
        Remove-Item "ffmpeg_temp" -Recurse -Force
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name=TikTokTTSBot --add-binary=ffmpeg.exe;. --add-binary=ffprobe.exe;. --hidden-import=edge_tts --hidden-import=TikTokLive --hidden-import=TikTokLive.events --hidden-import=pydub --hidden-import=asyncio --collect-all=edge_tts --clean --noconfirm bot.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TikTokTTSBot-Windows
        path: dist/TikTokTTSBot.exe
EOF
